<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <div class="row justify-content-center align-items-center login-wrapper">
                <div class="col-md-5">
                    <div class="card login-card">
                        <div class="card-body p-5">
                            <table class="table table-bordered table-striped">
                                <thead>
                                    <tr>
                                        <th>No</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="userTable">
                                    <tr>
                                        <td colspan="4" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'index.html'; // Redirect to login page if token is not found
        }
        getUsers(); // Call the function to fetch users when the page loads
        async function getUsers() {
            try {
                const response = await fetch('http://localhost:8000/api/users', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                const result = await response.json();
                console.log(result);
                if (response.status === 401) {
                    // Token is invalid or expired, redirect to login page
                    localStorage.removeItem('token');
                    window.location.href = 'index.html';
                }
                let html = '';
                result.data.forEach((user, index) => {
                    html += `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>Edit | Delete</td>

                            </tr>
                        `;
                });
                document.getElementById('userTable').innerHTML = html;
            } catch (error) {
                console.error('Error fetching users:', error);
                document.getElementById('userTable').innerHTML = `
                <tr>
                    <td colspan="4" class="text-center">
                        Failed to load users.
                    </td>
                </tr>`;
            }
        }
    </script>
</body>

</html>
