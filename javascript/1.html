        <form action="" method="post" onsubmit="JasaPengiriman(event)">
            <label for="">Masukkan Nama Kota</label>
            <input type="text" id="kota">
            <button onclick="JasaPengiriman()">
                Tes

        <p id="hasil">

    <script>
        function JasaPengiriman(e) {
            e.preventDefault();
            let kota = document.querySelector("#kota").value;
            let berat = 10;
            let tarif = 0;

            if (kota === "Bogor") {
                tarif = 2000;
            } else if (kota === "Depok") {
                tarif = 4000;
            } else {
                tarif = 6000;
            }
            const total = `Tarifnya adalah sebesar ${berat * tarif}`;
            document.querySelector("#hasil").innerHTML = total;
        }
