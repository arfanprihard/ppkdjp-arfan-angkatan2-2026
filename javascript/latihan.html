<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css">
</head>

<body class="bg-gray-100">
    <main class="min-h-screen flex items-center justify-center p-4">

        <section class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-4xl">

            <h1 class="text-center font-bold text-2xl mb-6">
                Data Mahasiswa
            </h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <form onsubmit="return false" class="flex flex-col gap-4">
                        <div>
                            <label>Nama</label>
                            <input type="text" id="nama" placeholder="Arfan Prihardiansyah" required
                                class="w-full border border-gray-200 rounded-lg h-10 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div>
                            <label>Nilai Teori</label>
                            <input type="number" id="nilai-teori" placeholder="0.0 - 100.0" required
                                class="w-full border border-gray-200 rounded-lg h-10 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div>
                            <label>Nilai Praktek</label>
                            <input type="number" id="nilai-praktek" placeholder="0.0 - 100.0" required
                                class="w-full border border-gray-200 rounded-lg h-10 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div>
                            <label>Kehadiran</label>
                            <div class="relative">
                                <input type="number" id="kehadiran" placeholder="0.0 - 100.0" required
                                    class="w-full border border-gray-200 rounded-lg h-10 px-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500">

                                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                                    %
                                </span>
                            </div>
                        </div>
                        <div>
                            <label>Pelanggaran</label>
                            <select id="pelanggaran" required
                                class="w-full border border-gray-200 rounded-lg h-10 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

                                <option value="" disabled selected>Pilih</option>
                                <option value="true">Ada</option>
                                <option value="false">Tidak</option>

                            </select>
                        </div>

                        <button onclick="ProcessData()" class="bg-blue-600 text-white py-2 rounded-xl hover:opacity-90">
                            Submit
                        </button>

                    </form>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border">

                    <h2 class="font-bold text-lg mb-4">Keterangan</h2>

                    <div class="space-y-2 mb-4 text-sm">
                        <div class="flex justify-between">
                            <span>Nama</span>
                            <span id="nama-txt"></span>
                        </div>

                        <div class="flex justify-between">
                            <span>Rata-rata</span>
                            <span id="rata2-txt"></span>
                        </div>

                        <div class="flex justify-between">
                            <span>Status</span>
                            <span id="status-txt" class="font-semibold"></span>
                        </div>
                    </div>

                    <hr class="my-3">

                    <div class="space-y-2 text-sm">

                        <div class="flex justify-between bg-white p-2 rounded-lg">
                            <span>Teori</span>
                            <span id="status-teori"></span>
                        </div>

                        <div class="flex justify-between bg-white p-2 rounded-lg">
                            <span>Praktek</span>
                            <span id="status-praktek"></span>
                        </div>

                        <div class="flex justify-between bg-white p-2 rounded-lg">
                            <span>Kehadiran</span>
                            <span id="status-kehadiran"></span>
                        </div>

                        <div class="flex justify-between bg-white p-2 rounded-lg">
                            <span>Pelanggaran</span>
                            <span id="status-pelanggaran"></span>
                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>
</body>
<script>
    function ProcessData() {

        const nama = document.querySelector("#nama").value;
        const nilaiTeori = Number(document.querySelector("#nilai-teori").value);
        const nilaiPraktek = Number(document.querySelector("#nilai-praktek").value);
        const kehadiran = Number(document.querySelector("#kehadiran").value);
        const memilikiPelanggaran = document.querySelector("#pelanggaran").value;
        const adaPelanggaran = memilikiPelanggaran == "true" ? true : false;
        if (!(nama && nilaiTeori && nilaiPraktek && kehadiran && memilikiPelanggaran)) {
            return;
        }
        const rataRata = (nilaiTeori + nilaiPraktek) / 2;
        let status = false;
        if (nilaiTeori < 75 || nilaiPraktek < 80 || kehadiran < 90 || adaPelanggaran) {
            status = "Tidak Lulus"
        } else if (rataRata > 90) {
            status = "Lulus dengan Predikat Sangat Baik"
        } else if (rataRata > 85) {
            status = "Lulus dengan Predikat Baik"
        } else {
            status = "Lulus"
        }
        document.querySelector("#nama-txt").innerHTML = nama;
        document.querySelector("#rata2-txt").innerHTML = rataRata;
        document.querySelector("#status-txt").innerHTML = status;
        document.querySelector("#status-kehadiran").innerHTML = kehadiran < 90 ? "Kehadiran Kurang" : "Baik";
        document.querySelector("#status-teori").innerHTML = nilaiTeori < 75 ? "Teori Kurang" : "Baik";
        document.querySelector("#status-praktek").innerHTML = nilaiPraktek < 80 ? "Praktek Kurang" : "Baik";
        document.querySelector("#status-pelanggaran").innerHTML = adaPelanggaran ? "Pelanggaran Disiplin" : "Baik";
    } </script>

</html>
